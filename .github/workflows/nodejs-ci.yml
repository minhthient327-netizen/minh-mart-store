name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Validate server syntax
        run: node -c server.js

      - name: Verify application startup
        run: |
          node server.js &
          APP_PID=$!
          sleep 3
          kill $APP_PID
          echo "Server started successfully"
